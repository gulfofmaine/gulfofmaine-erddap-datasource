exclude = "^(\\.config/|dist/|package-lock\\.json$)"

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "gofmt",
    name = "gofmt",
    language = "system",
    entry = "gofmt -l -w",
    files = "\\.go$",
  },
  {
    id = "prettier",
    name = "prettier",
    language = "system",
    entry = "npx --no-install prettier --write --ignore-unknown",
    files = "\\.(ts|tsx|js|jsx|mjs|json|css|scss|md|yaml|yml)$",
  },
]
