name: Create Plugin Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # run once a month on the 1st day

# To use this workflow please create a fine-grained personal access token for your repository with:
# `contents: read and write`
# `pull requests: read and write`
# `workflows: read and write`

permissions:
  contents: read # the composite action checks out the repo with the default token before pushing with GH_PAT_TOKEN

concurrency:
  group: ${{ github.workflow }}

jobs:
  release:
    name: Create plugin update PR
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/plugin-actions/create-plugin-update@b82357e85d512c678416146ca4e9f8672bd108da # create-plugin-update/v2.0.2
        with:
          # Make sure to save the token in your repository secrets as `GH_PAT_TOKEN`
          token: ${{ secrets.GH_PAT_TOKEN }}
